<text x="403.3" y="258.0" style="font-size:24px;font-weight:750;fill:#1f2a3d;">1.46</text>
<rect x="736.7" y="192.0" width="329.3" height="88" rx="10" fill="#f4f7fb" stroke="#d9e1ef"/>
