<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
<rect width="100%" height="100%" fill="#ffffff"/>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; fill: #243044; }
.title { font-size: 24px; font-weight: 700; }
.label { font-size: 15px; }
.small { font-size: 13px; fill: #5d6b82; }
.value { font-size: 15px; font-weight: 700; }
</style>
<text x="32" y="42" class="title">資料品質檢查：異常筆數</text>
<text x="176" y="111.6" text-anchor="end" class="label">原始欄位完整列重複</text>
<rect x="190" y="91.4" width="0.0" height="27.0" rx="5" fill="#596b82"/>
<text x="200.0" y="111.6" class="value">0</text>
<text x="176" y="163.5" text-anchor="end" class="label">NO 重複筆數（遮罩後不適合當唯一保單 ID）</text>
<rect x="190" y="143.3" width="665.0" height="27.0" rx="5" fill="#596b82"/>
<text x="865.0" y="163.5" class="value">376,258</text>
<text x="176" y="215.4" text-anchor="end" class="label">投保日期晚於生效日</text>
<rect x="190" y="195.2" width="0.0" height="27.0" rx="5" fill="#596b82"/>
<text x="200.0" y="215.4" class="value">0</text>
<text x="176" y="267.3" text-anchor="end" class="label">旅程結束日早於生效日</text>
<rect x="190" y="247.0" width="0.0" height="27.0" rx="5" fill="#596b82"/>
<text x="200.0" y="267.3" class="value">0</text>
<text x="176" y="319.1" text-anchor="end" class="label">DAYS 與生效起迄日不一致</text>
<rect x="190" y="298.9" width="0.0" height="27.0" rx="5" fill="#596b82"/>
<text x="200.0" y="319.1" class="value">0</text>
<text x="176" y="371.0" text-anchor="end" class="label">SITE_CODE 缺漏</text>
<rect x="190" y="350.8" width="0.0" height="27.0" rx="5" fill="#596b82"/>
<text x="200.0" y="371.0" class="value">12</text>
<text x="176" y="422.9" text-anchor="end" class="label">SITE_CODE 無法拆解</text>
<rect x="190" y="402.7" width="0.0" height="27.0" rx="5" fill="#596b82"/>
<text x="200.0" y="422.9" class="value">0</text>
<text x="176" y="474.8" text-anchor="end" class="label">年齡小於0或大於100</text>
<rect x="190" y="454.5" width="0.0" height="27.0" rx="5" fill="#596b82"/>
<text x="200.0" y="474.8" class="value">0</text>
</svg>
